<!DOCTYPE html>
<html>
<head>
  <title> Weather UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT IMAGE PANEL -->
  <div class="left-panel" id="leftPanel">

    <div class="city-top">
      <h2 id="cityTop">--</h2>
      <span id="countryTop">--</span>
    </div>

    <div class="bottom-left">
      <div class="time-box">
        <h1 id="clock"></h1>
        <p id="date"></p>
      </div>

      <div class="temp-big">
        <h1 id="bigTemp">--°c</h1>
      </div>
    </div>

  </div>

  <!-- RIGHT INFO PANEL -->
  <div class="right-panel">

    <div class="weather-icon">
   <img id="icon" src="image/WeatherIcons.gif" alt="Weather Icon">
</div>

    <h1 id="status">weather</h1>

    <div class="divider"></div>

    <div class="search-box">
  <input type="text" id="searchInput" placeholder="Search any city">
  <button class="search-btn" onclick="getWeather()">
    <span class="search-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="white">
    <path d="M10 18a8 8 0 1 1 5.3-14.1A8 8 0 0 1 10 18zm0-14a6 6 0 1 0 3.9 10.5l4.3 4.3 1.4-1.4-4.3-4.3A6 6 0 0 0 10 4z"/>
  </svg>
</span></span>
  </button>
</div>

    <div class="location-row">
      <p id="cityName">No City Selected</p>
      <span class="dot"></span>
    </div>

    <div class="details">
      <div class="row">
        <span>Temperature</span>
        <span id="tempDetail"></span>
      </div>
      <div class="row">
        <span>Humidity</span>
        <span id="humidity"></span>
      </div>
      <div class="row">
        <span>Visibility</span>
        <span id="visibility"></span>
      </div>
      <div class="row">
        <span>Wind Speed</span>
        <span id="wind"></span>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
